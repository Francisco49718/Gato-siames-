<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Siamés Ultimate Insanity 🐱🔥</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1020;
  color: white;
  text-align: center;
}

#world {
  height: 320px;
  margin: 10px;
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 110px;
  background: radial-gradient(circle at top, #1e293b, #0b1020);
  transition: 0.3s;
}

button {
  margin: 5px;
  padding: 10px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
}

.panel {
  background: #111827;
  margin: 10px;
  padding: 10px;
  border-radius: 12px;
}
</style>
</head>

<body>

<h2>🐱 SIAMÉS ULTIMATE INSANITY</h2>

<div id="world">🏠</div>

<div class="panel">
💰 <span id="money">0</span> |
🍗 <span id="hunger">50</span> |
⚡ <span id="energy">50</span> |
😸 <span id="happiness">50</span>
</div>

<div class="panel">
<button onclick="feed()">🍗 Comer</button>
<button onclick="shower()">🚿 Ducha</button>
<button onclick="work()">💼 Trabajar</button>
<button onclick="shop()">🛒 Tienda</button>
<button onclick="sleep()">😴 Dormir</button>
<button onclick="eventRandom()">🎲 Evento</button>
</div>

<div class="panel" id="shop" style="display:none;">
<h3>🛒 TIENDA</h3>
<button onclick="buy('fish')">🐟 Pescado (+30 hambre) - 10💰</button>
<button onclick="buy('bed')">🛏️ Cama (+40 energía) - 20💰</button>
<button onclick="buy('toy')">🧸 Juguete (+30 felicidad) - 15💰</button>
<br><br>
<button onclick="shop()">❌ Cerrar</button>
</div>

<p id="msg"></p>

<script>

let money = 0;
let hunger = 50;
let energy = 50;
let happiness = 50;

const world = document.getElementById("world");
const msg = document.getElementById("msg");

function update() {
  document.getElementById("money").textContent = money;
  document.getElementById("hunger").textContent = hunger;
  document.getElementById("energy").textContent = energy;
  document.getElementById("happiness").textContent = happiness;

  if (hunger < 20 || energy < 20 || happiness < 20) world.textContent = "😿";
  else if (happiness > 80) world.textContent = "😻";
  else world.textContent = "🐱";
}

function feed() {
  hunger += 25;
  happiness += 5;
  msg.textContent = "🍗 ñam ñam!";
  update();
}

function shower() {
  happiness += Math.random() > 0.5 ? 20 : -10;
  energy -= 5;
  msg.textContent = "🚿 baño caótico...";
  update();
}

function work() {
  world.textContent = "🏢💼";

  setTimeout(() => {
    let r = Math.random();

    if (r < 0.4) {
      money += 30;
      msg.textContent = "💰 trabajo normal";
    } else if (r < 0.8) {
      money += 60;
      happiness += 10;
      msg.textContent = "🔥 trabajo épico";
    } else {
      money += 5;
      happiness -= 20;
      msg.textContent = "💀 jefe malvado";
    }

    energy -= 15;
    hunger -= 10;
    world.textContent = "🏠";
    update();
  }, 1800);
}

function sleep() {
  energy += 40;
  happiness += 5;
  msg.textContent = "😴 sueño profundo";
  update();
}

function shop() {
  let s = document.getElementById("shop");
  s.style.display = s.style.display === "none" ? "block" : "none";
}

function buy(item) {
  if (item === "fish" && money >= 10) {
    money -= 10;
    hunger += 30;
    msg.textContent = "🐟 pescado brutal!";
  }
  if (item === "bed" && money >= 20) {
    money -= 20;
    energy += 40;
    msg.textContent = "🛏️ cama comfy";
  }
  if (item === "toy" && money >= 15) {
    money -= 15;
    happiness += 30;
    msg.textContent = "🧸 súper feliz!";
  }
  update();
}

function eventRandom() {
  let r = Math.random();

  if (r < 0.2) {
    money += 100;
    msg.textContent = "🎉 JACKPOT!";
  } else if (r < 0.4) {
    hunger = 0;
    msg.textContent = "🐭 robo de comida!";
  } else if (r < 0.6) {
    happiness += 40;
    msg.textContent = "💖 amor infinito";
  } else if (r < 0.8) {
    energy = 0;
    msg.textContent = "💀 bug del universo";
  } else {
    money += 20;
    msg.textContent = "✨ trabajo sorpresa!";
  }

  update();
}

setInterval(() => {
  hunger -= 2;
  energy -= 1;
  happiness -= 1;
  update();
}, 2000);

update();

</script>

</body>
  </html>
